apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bharat-onestop-api
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: bharat-onestop-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/bharat-onestop-backend:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: GCP_PROJECT_ID
          value: "YOUR_PROJECT_ID"
        - name: GCP_STORAGE_BUCKET
          value: "bharat-onestop-documents"
        # Secrets should be mounted from Google Secret Manager
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-uri
              key: latest
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: latest
